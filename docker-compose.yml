services:
  web:
    build: .
    expose:
      - "3000"
    volumes:
      - solstice_data:/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
      # Set these in a .env file or export them before running docker compose
      # Get free keys at https://cloudflare.com/turnstile
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    environment:
      - DOMAIN=${DOMAIN:-solsticerow.nvarscar.ca}
    ports:
      - "12080:80"
      - "12443:443"
    volumes:
      - ./nginx/http-only.conf:/etc/nginx/templates/http-only.conf:ro
      - ./nginx/https.conf:/etc/nginx/templates/https.conf:ro
      - ./nginx/docker-entrypoint.sh:/etc/nginx/docker-entrypoint.sh:ro
      # Set LETSENCRYPT_DIR in .env or defaults to /etc/letsencrypt
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
    entrypoint: ["/bin/sh", "/etc/nginx/docker-entrypoint.sh"]
    depends_on:
      - web
    restart: unless-stopped

volumes:
  solstice_data:
    driver: local
