backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "event"
    label: "Event Info"
    files:
      - label: "Event Details"
        name: "event"
        file: "content/event.json"
        format: json
        fields:
          - { label: "Event Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Edition / Year", name: "edition", widget: "string" }
          - { label: "Date", name: "date", widget: "string", hint: "e.g. June 21, 2025" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Start Time", name: "startTime", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Registration URL", name: "registrationUrl", widget: "string" }
          - { label: "Registration Open", name: "registrationOpen", widget: "boolean", default: true }
          - { label: "Registration Deadline", name: "registrationDeadline", widget: "string" }
          - { label: "Contact Email", name: "contactEmail", widget: "string" }
          - { label: "Contact Phone", name: "contactPhone", widget: "string" }

  - name: "schedule"
    label: "Schedule"
    files:
      - label: "Schedule Items"
        name: "schedule"
        file: "content/schedule.json"
        format: json
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["row", "race", "logistics", "ceremony", "social"]

  - name: "results"
    label: "Results"
    files:
      - label: "Race Results"
        name: "results"
        file: "content/results.json"
        format: json
        fields:
          - label: "Years"
            name: "years"
            widget: "list"
            fields:
              - { label: "Year", name: "year", widget: "string" }
              - label: "Categories"
                name: "categories"
                widget: "list"
                fields:
                  - { label: "Category Name", name: "name", widget: "string" }
                  - label: "Entries"
                    name: "entries"
                    widget: "list"
                    fields:
                      - { label: "Place", name: "place", widget: "number" }
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Club", name: "club", widget: "string" }
                      - { label: "Time", name: "time", widget: "string" }

  - name: "sponsors"
    label: "Sponsors"
    files:
      - label: "Sponsor Tiers"
        name: "sponsors"
        file: "content/sponsors.json"
        format: json
        fields:
          - label: "Tiers"
            name: "tiers"
            widget: "list"
            fields:
              - { label: "Tier Name", name: "name", widget: "string" }
              - label: "Sponsors"
                name: "sponsors"
                widget: "list"
                fields:
                  - { label: "Sponsor Name", name: "name", widget: "string" }
                  - { label: "Website URL", name: "url", widget: "string" }
                  - { label: "Logo", name: "logo", widget: "image", required: false }
