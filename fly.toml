# fly.toml app configuration file generated for solstice-row on 2026-06-05T20:42:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solstice-row'
primary_region = 'yyz'

[build]
  build-target = 'runner'

[env]
  DATA_DIR = '/data'
  NEXT_PUBLIC_SITE_URL = 'https://solsticerow.ca'
  NODE_ENV = 'production'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1GB'
  snapshot_retention = 14

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
