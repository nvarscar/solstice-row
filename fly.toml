# Fly.io configuration for Solstice Row
# 1. Create the app: fly apps create solstice-row
# 2. Create the volume: fly volumes create data --region yyz --size 1 --app solstice-row
# 3. Add the custom domain: fly certs add solsticerow.ca
# 4. Deploy: fly deploy

app = "solstice-row"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"

[[services]]
  internal_port = 3000
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80

[[mounts]]
  source = "data"
  destination = "/data"
  initial_size = "1GB"
  snapshot_retention = 14

[[vm]]
  size = "shared-cpu-1x"
